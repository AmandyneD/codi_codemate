default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    database: codi_codemate_development
  cache:
    <<: *default
    database: codi_codemate_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: codi_codemate_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: codi_codemate_development_cable
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: codi_codemate_test
  cache:
    <<: *default
    database: codi_codemate_test_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: codi_codemate_test_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: codi_codemate_test_cable
    migrations_paths: db/cable_migrate

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    url: <%= ENV["CACHE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    url: <%= ENV["QUEUE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    url: <%= ENV["CABLE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate
